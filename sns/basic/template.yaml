AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SNS Basic
Resources:
  SNSTopic:
    Type: AWS::SNS::Topic
  Lambda:
    Type: AWS::Serverless::Function
    Properties:
      Handler: index.handler
      Runtime: python3.12
      PackageType: Zip
      InlineCode: |
        import json
        def handler(event, context):
            # event['Records'][0]['Sns']['Message'] is always a string
            message_str = event['Records'][0]['Sns']['Message']
            try:
                m = json.loads(message_str)
                first_name = m.get('first_name', 'Unknown')
                last_name = m.get('last_name', 'Unknown')
                message = f"Hello {first_name} {last_name}!"
                print(message)
                return {"message": message}
            except json.JSONDecodeError:
                print("Failed to parse message:", message_str)
                return {"message": "Invalid JSON payload"}
      Events:
        SNSEvent:
          Type: SNS
          Properties:
            Topic: !Ref SNSTopic